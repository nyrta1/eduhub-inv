name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check (test suite)
        run: ruff check tests/conftest.py tests/unit tests/security tests/integration tests/fixtures

      - name: Ruff format (test suite)
        run: ruff format --check tests/conftest.py tests/unit tests/security tests/integration tests/fixtures

  typecheck:
    name: mypy (scoped)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: mypy
        run: mypy

  unit-tests:
    name: Unit & security tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage
        run: >
          pytest tests/unit tests/security
          --cov=app
          --cov-report=xml
          --cov-report=term-missing
          -q

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    name: Integration (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      RUN_INTEGRATION: "1"
      APP_ENV: development
      APP_DEBUG: "false"
      APP_SECRET_KEY: "01234567890123456789012345678901"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379/1
      API_ALLOWED_HOSTS: test,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: ""
      METRICS_ENABLED: "true"
      METRICS_PATH: /metrics
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 604800

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=12

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Brief settle delay for service health
        run: sleep 12

      - name: Integration pytest
        run: pytest tests/integration -m integration -v --tb=short

  security-static:
    name: Bandit + pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] pip-audit
          pip install -e ".[dev]"

      - name: pip-audit
        run: pip-audit -r pyproject.toml --desc on

      - name: bandit
        run: bandit -r app -f screen --severity-level medium --confidence-level medium

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: student-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migration-check:
    name: Alembic upgrade (dry-run against service DB)
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      APP_SECRET_KEY: "01234567890123456789012345678901"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379/2

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: alembic upgrade head
        run: alembic upgrade head
