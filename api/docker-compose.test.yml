# Ephemeral Postgres + Redis for local integration tests.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   export RUN_INTEGRATION=1
#   export DATABASE_URL=postgresql+asyncpg://test:test@localhost:5433/testdb
#   export REDIS_URL=redis://localhost:6380/0
#   export APP_SECRET_KEY=<32+ chars>
#   pytest tests/integration -m integration -v

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  default:
    name: student-platform-test
