services:
  postgres:
    image: postgres:16-alpine
    container_name: spp-postgres
    restart: unless-stopped
    environment:
      # Defaults allow `docker compose up` without a `.env` file (override in production).
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: spp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: spp-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      # Avoid startup failures on small Docker Desktop disks (reenable thresholds in prod).
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: spp-logstash
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "${LOGSTASH_HTTP_PORT:-5044}:5044"
    volumes:
      - ./infra/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: spp-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: spp-prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    container_name: spp-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spp-api
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - SYS_ADMIN
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Local stack defaults: development exposes OpenAPI; set APP_ENV=production in real deploy.
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-student-platform-api}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-student-platform-dev-docker-secret-key-minimum-32chars}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      # Include `api` so Prometheus scrape (Host: api) passes TrustedHostMiddleware.
      API_ALLOWED_HOSTS: ${API_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173,http://ec2-100-31-52-198.compute-1.amazonaws.com}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://app_user:app_password@postgres:5432/app_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      LOG_SHIP_LOGSTASH: ${LOG_SHIP_LOGSTASH:-true}
      LOGSTASH_HTTP_ENDPOINT: ${LOGSTASH_HTTP_ENDPOINT:-http://logstash:5044}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_PATH: ${METRICS_PATH:-/metrics}
      REQUEST_MAX_BODY_BYTES: ${REQUEST_MAX_BODY_BYTES:-1048576}
      STRUCTLOG_CALLER_INFO: ${STRUCTLOG_CALLER_INFO:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s
    networks:
      - backend

networks:
  backend:
    driver: bridge
    name: student-platform-backend

volumes:
  postgres_data:
    name: spp_postgres_data
  redis_data:
    name: spp_redis_data
  elasticsearch_data:
    name: spp_elasticsearch_data
  prometheus_data:
    name: spp_prometheus_data
  grafana_data:
    name: spp_grafana_data
